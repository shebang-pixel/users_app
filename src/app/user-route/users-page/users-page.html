<div class="heading">
    <h1>Users Page</h1>
    <button 
        class="add-user"
        routerLink="/users/add"
    >
        Add User 
        <span class="add-sign">+</span>
    </button>
</div>

@if(loading()){
    <p class="spinner">Loading</p>
}

@if(error()) {
    <p class="error">{{error()}}</p>
}

@if(!loading() && !error()){
    @if(users().length === 0){
        <div>
            <p>User list is empty!</p>
        </div>
    } @else {
        @for(user of users(); track user.id){
            <div [routerLink]="['/users',user.id]">
                <app-user-card
                    [user]="user">
                </app-user-card>
            </div>
        }
    }
}
