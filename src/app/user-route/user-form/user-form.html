<div class="form-container">
    <div class="header">
        <h1>{{ id() ? 'Edit User' : 'New User' }}</h1>
        <button routerLink="/users" class="nav-back">Back</button>
    </div>

    <div>
        <form class="user-form" [formGroup]="userForm" (ngSubmit)="onSubmit()">
            <label for="first-name">First Name</label>
            <input id="first-name" class="first-name" formControlName="firstName" placeholder="Lorna" type="text">

            <label for="last-name">Last Name</label>
            <input id="last-name" class="last-name" formControlName="lastName" placeholder="Murugi" type="text">

            <label for="email">Email</label>
            <input id="email" class="email" formControlName="email" placeholder="murulorna@email.com" type="email">

            <button class="user-add" type="submit" [disabled]="userForm.invalid">
                {{ id() ? 'Save Changes' : 'Add User' }}
            </button>
        </form>
    </div>
</div>
